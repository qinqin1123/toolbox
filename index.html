<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万能百宝箱｜任务驱动型效率工具平台</title>
    <meta name="description" content="精选60+实用效率工具，按写作创作、设计媒体、编程开发、办公数据、学习研究、求职职场、AI工具7大任务分类，帮你快速找到最合适的工具。">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ========== 顶部导航栏 ========== -->
    <header class="site-header" id="siteHeader">
        <div class="header-inner">
            <div class="logo" onclick="scrollToTop()">
                <span class="logo-icon">🎒</span>
                <span class="logo-text">万能百宝箱</span>
            </div>

            <!-- 全局搜索栏 -->
            <div class="search-bar" id="searchBar">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索工具名、标签、功能..." autocomplete="off">
                <kbd class="search-kbd">/</kbd>
                <div class="search-clear" id="searchClear" style="display:none">×</div>
            </div>

            <!-- 暗色模式切换 -->
            <button class="dark-toggle" id="darkToggle" title="切换暗色模式">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>

            <!-- 移动端菜单按钮 -->
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- ========== 移动端分类抽屉 ========== -->
    <div class="mobile-drawer" id="mobileDrawer">
        <div class="drawer-overlay" id="drawerOverlay"></div>
        <div class="drawer-content" id="drawerContent">
            <!-- JS 动态填充 -->
        </div>
    </div>

    <!-- ========== 主内容区 ========== -->
    <main class="main-content">

        <!-- Hero 区 -->
        <section class="hero">
            <div class="hero-inner">
                <div class="hero-text">
                    <h1 class="hero-title">找到适合你的<br><span class="gradient-text">效率工具</span></h1>
                    <p class="hero-desc">精选 <strong id="toolCount">0</strong> 个优质工具，覆盖 <strong>7</strong> 大任务场景，每款都经过人工实测</p>
                </div>
                <div class="hero-stats">
                    <div class="stat-card">
                        <div class="stat-num" id="statTools">0</div>
                        <div class="stat-label">精选工具</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num">7</div>
                        <div class="stat-label">任务分类</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num">100%</div>
                        <div class="stat-label">人工实测</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 搜索结果区（默认隐藏） -->
        <section class="search-results" id="searchResults" style="display:none">
            <div class="section-header">
                <h2 id="searchResultsTitle">搜索结果</h2>
                <button class="btn-clear-search" id="clearSearchBtn">清除搜索</button>
            </div>
            <div class="tools-grid" id="searchResultsGrid"></div>
        </section>

        <!-- 分类筛选栏 -->
        <nav class="category-nav" id="categoryNav">
            <div class="category-scroll">
                <button class="cat-btn active" data-cat="all">
                    <span class="cat-icon">🌟</span>
                    <span class="cat-name">全部</span>
                    <span class="cat-count" id="countAll">0</span>
                </button>
                <!-- JS 动态生成其他分类按钮 -->
            </div>
        </nav>

        <!-- 仪表盘分类大卡片 -->
        <section class="dashboard" id="dashboard">
            <div class="dashboard-grid" id="dashboardGrid">
                <!-- JS 动态渲染 -->
            </div>
        </section>

        <!-- 全部工具列表 -->
        <section class="all-tools" id="allTools">
            <div class="section-header">
                <h2>全部工具</h2>
                <div class="sort-bar">
                    <span>排序：</span>
                    <button class="sort-btn active" data-sort="hot">🔥 热门</button>
                    <button class="sort-btn" data-sort="name">🔤 名称</button>
                    <button class="sort-btn" data-sort="difficulty">⭐ 难度</button>
                    <button class="sort-btn" data-sort="pricing">💰 免费</button>
                </div>
            </div>
            <div class="tools-grid" id="toolsGrid">
                <!-- JS 动态渲染 -->
            </div>
        </section>

    </main>

    <!-- ========== 工具详情弹窗 ========== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="toolModal">
            <button class="modal-close" id="modalClose">×</button>
            <div class="modal-body" id="modalBody">
                <!-- JS 动态填充 -->
            </div>
        </div>
    </div>

    <!-- ========== 底部 ========== -->
    <footer class="site-footer">
        <p>🎒 万能百宝箱 &copy; 2026 &nbsp;|&nbsp; 精选效率工具，让你少走弯路</p>
        <p class="footer-sub">提示：按 <kbd>/</kbd> 快速搜索 &nbsp;|&nbsp; 按 <kbd>Esc</kbd> 关闭弹窗 &nbsp;|&nbsp; <kbd>1-7</kbd> 切换分类</p>
    </footer>

    <!-- ========== JS ========== -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
